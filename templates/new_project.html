{% extends "base.html" %}
{% block title %}New Project — Superintendent AI{% endblock %}
{% block content %}
<div x-data="projectForm()" class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Create New Project</h1>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
                <input type="text" x-model="name" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., 3-Bedroom House at 123 Main St">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Project Description</label>
                <textarea x-model="description" rows="6" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Describe the project in detail. The AI will break this down into construction tasks..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
                    <input type="date" x-model="start_date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Target End Date</label>
                    <input type="date" x-model="target_end_date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
            </div>

            <button @click="createAndPlan()" :disabled="loading || !name || !description"
                class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                <template x-if="loading">
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </template>
                <span x-text="loading ? loadingText : 'Generate Plan'"></span>
            </button>
        </div>
    </div>

    <!-- Plan Preview -->
    <template x-if="plan">
        <div class="mt-6 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">AI-Generated Plan</h2>
            <div class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap" x-text="plan"></div>
            <div class="mt-6 flex space-x-3">
                <button @click="confirmAndAssign()" :disabled="confirming"
                    class="bg-green-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50 flex items-center">
                    <template x-if="confirming">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </template>
                    <span x-text="confirming ? 'Assigning contractors...' : 'Confirm & Assign Contractors'"></span>
                </button>
                <a :href="'/projects/' + projectId" class="bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-300">View Project</a>
            </div>
        </div>
    </template>

    <!-- Error -->
    <template x-if="error">
        <div class="mt-4 bg-red-50 border-l-4 border-red-400 p-4 rounded">
            <p class="text-sm text-red-700" x-text="error"></p>
        </div>
    </template>
</div>

<script>
function projectForm() {
    return {
        name: '', description: '', start_date: '', target_end_date: '',
        loading: false, loadingText: 'Generating plan...', confirming: false,
        plan: null, projectId: null, error: null,

        async createAndPlan() {
            this.loading = true; this.error = null; this.plan = null;
            try {
                // Step 1: Create project
                this.loadingText = 'Creating project...';
                const body = { name: this.name, description: this.description };
                if (this.start_date) body.start_date = this.start_date;
                if (this.target_end_date) body.target_end_date = this.target_end_date;

                const createRes = await fetch('/api/projects/', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                if (!createRes.ok) throw new Error('Failed to create project');
                const project = await createRes.json();
                this.projectId = project.id;

                // Step 2: Generate plan
                this.loadingText = 'AI is generating task plan...';
                const planRes = await fetch('/api/agent/generate-plan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ project_id: project.id }) });
                if (!planRes.ok) throw new Error('Failed to generate plan');
                const planData = await planRes.json();
                this.plan = planData.plan;
            } catch (e) {
                this.error = e.message;
            }
            this.loading = false;
        },

        async confirmAndAssign() {
            this.confirming = true; this.error = null;
            try {
                const res = await fetch('/api/agent/assign-contractors', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ project_id: this.projectId }) });
                if (!res.ok) throw new Error('Failed to assign contractors');
                window.location.href = '/projects/' + this.projectId;
            } catch (e) {
                this.error = e.message;
            }
            this.confirming = false;
        }
    }
}
</script>
{% endblock %}
