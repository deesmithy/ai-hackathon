{% extends "base.html" %}
{% block title %}New Project — Superintendent AI{% endblock %}
{% block content %}
<div x-data="projectForm()" class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="mb-8">
        <a href="/" class="inline-flex items-center text-sm text-surface-400 hover:text-brand-600 transition-colors mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
            Back to Dashboard
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Create New Project</h1>
        <p class="text-sm text-surface-500 mt-1">Describe your project and let AI generate the construction plan</p>
    </div>

    <!-- Step Indicator -->
    <div class="flex items-center mb-8">
        <!-- Step 1 -->
        <div class="flex items-center">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold"
                :class="step > 1 ? 'bg-emerald-500 text-white' : 'bg-brand-600 text-white'">
                <template x-if="step > 1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                </template>
                <template x-if="step === 1"><span>1</span></template>
            </div>
            <span class="ml-2 text-sm font-medium" :class="step > 1 ? 'text-emerald-600' : 'text-gray-900'">Describe Project</span>
        </div>
        <div class="flex-1 h-px mx-4" :class="step > 1 ? 'bg-emerald-300' : 'bg-surface-200'"></div>
        <!-- Step 2 -->
        <div class="flex items-center">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold"
                :class="step === 2 ? 'bg-brand-600 text-white' : 'bg-surface-200 text-surface-400'">
                <span>2</span>
            </div>
            <span class="ml-2 text-sm font-medium" :class="step === 2 ? 'text-gray-900' : 'text-surface-400'">Review &amp; Confirm</span>
        </div>
    </div>

    <!-- ===== STEP 1: FORM ===== -->
    <template x-if="step === 1">
        <div class="bg-white rounded-2xl shadow-sm border border-surface-200 overflow-hidden">
            <div class="p-6 md:p-8 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Project Name</label>
                    <input type="text" x-model="name"
                        class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"
                        placeholder="e.g., 3-Bedroom House at 123 Main St">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Project Description</label>
                    <textarea x-model="description" rows="5"
                        class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all leading-relaxed"
                        placeholder="Describe the full scope of work. The AI will break this into ordered tasks with contractor specialties..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Start Date</label>
                        <input type="date" x-model="start_date"
                            class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Target End Date</label>
                        <input type="date" x-model="target_end_date"
                            class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Upload Project Document <span class="text-surface-400 font-normal">(optional PDF)</span></label>
                    <input type="file" accept=".pdf" @change="file = $event.target.files[0]"
                        class="w-full text-sm text-surface-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 cursor-pointer">
                    <p x-show="file" class="text-xs text-emerald-600 mt-1.5" x-text="'Selected: ' + (file ? file.name : '')"></p>
                </div>

                <button @click="createAndPlan()" :disabled="loading || !name || !description"
                    class="w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center shadow-sm shadow-brand-600/20 transition-all mt-2">
                    <template x-if="loading">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </template>
                    <span x-text="loading ? 'Generating plan...' : 'Generate Plan with AI'"></span>
                </button>
            </div>
        </div>
    </template>

    <!-- ===== STEP 2: REVIEW & CONFIRM ===== -->
    <template x-if="step === 2">
        <div class="fade-in">
            <div class="bg-white rounded-2xl shadow-sm border border-surface-200 overflow-hidden">
                <div class="border-b border-surface-100 px-6 md:px-8 py-4 flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-lg bg-brand-50 flex items-center justify-center">
                        <svg class="w-4 h-4 text-brand-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-base font-semibold text-gray-900">AI-Generated Plan &amp; Assignments</h2>
                        <p class="text-xs text-surface-400 mt-0.5" x-text="items.length + ' tasks with assigned contractors'"></p>
                    </div>
                </div>

                <div class="divide-y divide-surface-100">
                    <template x-for="item in items" :key="item.task_id || item.sequence_order">
                        <div class="px-6 md:px-8 py-4 flex items-start space-x-4">
                            <div class="w-7 h-7 rounded-full bg-surface-100 flex items-center justify-center text-xs font-bold text-surface-500 flex-shrink-0 mt-0.5" x-text="item.sequence_order"></div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-start justify-between gap-3">
                                    <p class="text-sm font-semibold text-gray-900" x-text="item.task_name || item.name"></p>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-brand-50 text-brand-700 flex-shrink-0" x-text="item.specialty_needed || 'General'"></span>
                                </div>
                                <p class="text-sm text-surface-500 mt-1 leading-relaxed" x-text="item.description"></p>
                                <div class="flex items-center space-x-4 mt-2">
                                    <span class="text-xs text-surface-400" x-show="item.estimated_days" x-text="item.estimated_days + ' days'"></span>
                                    <template x-if="item.contractor_name">
                                        <div class="flex items-center space-x-2">
                                            <svg class="w-3.5 h-3.5 text-surface-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                                            <span class="text-xs font-medium text-gray-700" x-text="item.contractor_name"></span>
                                            <span class="text-xs text-surface-400" x-show="item.rating_reliability" x-text="'· R:' + item.rating_reliability + ' Q:' + item.rating_quality"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="px-6 md:px-8 py-5 bg-surface-50 border-t border-surface-100 space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Feedback to regenerate <span class="text-surface-400 font-normal">(optional)</span></label>
                        <textarea x-model="feedback" rows="2"
                            class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all leading-relaxed"
                            placeholder="e.g., Add a landscaping phase, use a different electrician, prefer higher-rated contractors..."></textarea>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button @click="regenerate()" :disabled="regenerating || !feedback.trim()"
                            class="bg-white border border-surface-200 text-gray-700 px-5 py-2.5 rounded-xl text-sm font-semibold hover:border-surface-300 hover:bg-surface-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center transition-all">
                            <template x-if="regenerating">
                                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                            </template>
                            <span x-text="regenerating ? 'Regenerating...' : 'Regenerate with Feedback'"></span>
                        </button>
                        <button @click="confirmProject()" :disabled="confirming"
                            class="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-emerald-700 disabled:opacity-50 flex items-center shadow-sm shadow-emerald-600/20 transition-all">
                            <template x-if="confirming">
                                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                            </template>
                            <span x-text="confirming ? 'Starting project...' : 'Confirm &amp; Start Project'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Error -->
    <template x-if="error">
        <div class="mt-5 flex items-start space-x-3 bg-red-50 border border-red-200 rounded-xl p-4 fade-in">
            <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            <p class="text-sm text-red-700" x-text="error"></p>
        </div>
    </template>
</div>

<script>
function projectForm() {
    return {
        step: 1,
        name: '', description: '', start_date: '', target_end_date: '', file: null,
        items: [],
        projectId: null,
        feedback: '',
        loading: false,
        regenerating: false,
        confirming: false,
        error: null,

        async createAndPlan() {
            this.loading = true; this.error = null;
            const done = aiAction(
                'Generating Construction Plan',
                'The AI is designing your task plan and matching contractors.',
                ['Creating project record...', 'Reading project description...', 'Checking contractor roster...', 'Designing task sequence...', 'Matching contractors by specialty...', 'Finalizing plan...']
            );
            try {
                const formData = new FormData();
                formData.append('name', this.name);
                formData.append('description', this.description);
                if (this.start_date) formData.append('start_date', this.start_date);
                if (this.target_end_date) formData.append('target_end_date', this.target_end_date);
                if (this.file) formData.append('file', this.file);

                const res = await fetch('/api/agent/create-and-plan', { method: 'POST', body: formData });
                if (!res.ok) throw new Error('Failed to generate plan');
                const data = await res.json();
                this.projectId = data.project_id;
                this.items = data.items;
                this.step = 2;
            } catch (e) {
                this.error = e.message;
            }
            done();
            this.loading = false;
        },

        async regenerate() {
            this.regenerating = true; this.error = null;
            const done = aiAction(
                'Regenerating Plan',
                'The AI is revising tasks and assignments based on your feedback.',
                ['Reading your feedback...', 'Adjusting task sequence...', 'Re-matching contractors...', 'Updating plan...']
            );
            try {
                const res = await fetch('/api/agent/regenerate-tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ project_id: this.projectId, feedback: this.feedback })
                });
                if (!res.ok) throw new Error('Failed to regenerate plan');
                const data = await res.json();
                this.items = data.items;
                this.feedback = '';
            } catch (e) {
                this.error = e.message;
            }
            done();
            this.regenerating = false;
        },

        async confirmProject() {
            this.confirming = true; this.error = null;
            try {
                const res = await fetch('/api/agent/confirm-assignments', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ project_id: this.projectId })
                });
                if (!res.ok) throw new Error('Failed to confirm project');
                window.location.href = '/projects/' + this.projectId;
            } catch (e) {
                this.error = e.message;
                this.confirming = false;
            }
        }
    }
}
</script>
{% endblock %}
