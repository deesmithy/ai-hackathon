{% extends "base.html" %}
{% block title %}New Project — Superintendent AI{% endblock %}
{% block content %}
<div x-data="projectForm()" class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="mb-8">
        <a href="/" class="inline-flex items-center text-sm text-surface-400 hover:text-brand-600 transition-colors mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
            Back to Dashboard
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Create New Project</h1>
        <p class="text-sm text-surface-500 mt-1">Describe your project and let AI generate the construction plan</p>
    </div>

    <!-- Step Indicator -->
    <div class="flex items-center mb-8">
        <div class="flex items-center">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold" :class="plan ? 'bg-emerald-500 text-white' : 'bg-brand-600 text-white'">
                <template x-if="plan"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.5 12.75l6 6 9-13.5"/></svg></template>
                <template x-if="!plan"><span>1</span></template>
            </div>
            <span class="ml-2 text-sm font-medium" :class="plan ? 'text-emerald-600' : 'text-gray-900'">Describe Project</span>
        </div>
        <div class="flex-1 h-px mx-4" :class="plan ? 'bg-emerald-300' : 'bg-surface-200'"></div>
        <div class="flex items-center">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold" :class="plan ? 'bg-brand-600 text-white' : 'bg-surface-200 text-surface-400'">2</div>
            <span class="ml-2 text-sm font-medium" :class="plan ? 'text-gray-900' : 'text-surface-400'">Review & Assign</span>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-surface-200 overflow-hidden">
        <div class="p-6 md:p-8 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Project Name</label>
                <input type="text" x-model="name" :disabled="!!plan"
                    class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all disabled:bg-surface-50 disabled:text-surface-500"
                    placeholder="e.g., 3-Bedroom House at 123 Main St">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Project Description</label>
                <textarea x-model="description" rows="5" :disabled="!!plan"
                    class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all leading-relaxed disabled:bg-surface-50 disabled:text-surface-500"
                    placeholder="Describe the full scope of work. The AI will break this into ordered tasks with contractor specialties..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Start Date</label>
                    <input type="date" x-model="start_date" :disabled="!!plan"
                        class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all disabled:bg-surface-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Target End Date</label>
                    <input type="date" x-model="target_end_date" :disabled="!!plan"
                        class="w-full border border-surface-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all disabled:bg-surface-50">
                </div>
            </div>

            <template x-if="!plan">
                <button @click="createAndPlan()" :disabled="loading || !name || !description"
                    class="w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center shadow-sm shadow-brand-600/20 transition-all mt-2">
                    <template x-if="loading">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </template>
                    <span x-text="loading ? loadingText : 'Generate Plan with AI'"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- Plan Preview -->
    <template x-if="plan">
        <div class="mt-6 bg-white rounded-2xl shadow-sm border border-surface-200 overflow-hidden fade-in">
            <div class="border-b border-surface-100 px-6 md:px-8 py-4 flex items-center space-x-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center">
                    <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <h2 class="text-base font-semibold text-gray-900">AI-Generated Plan</h2>
            </div>
            <div class="px-6 md:px-8 py-5">
                <div class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed bg-surface-50 rounded-xl p-5 border border-surface-100 max-h-96 overflow-y-auto" x-text="plan"></div>
            </div>
            <div class="px-6 md:px-8 py-4 bg-surface-50 border-t border-surface-100 flex items-center space-x-3">
                <button @click="confirmAndAssign()" :disabled="confirming"
                    class="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-emerald-700 disabled:opacity-50 flex items-center shadow-sm shadow-emerald-600/20 transition-all">
                    <template x-if="confirming">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </template>
                    <span x-text="confirming ? 'Assigning contractors...' : 'Confirm & Assign Contractors'"></span>
                </button>
                <a :href="'/projects/' + projectId" class="text-surface-500 hover:text-gray-700 px-4 py-2.5 rounded-xl text-sm font-medium border border-surface-200 hover:border-surface-300 transition-all">Skip to Project</a>
            </div>
        </div>
    </template>

    <!-- Error -->
    <template x-if="error">
        <div class="mt-5 flex items-start space-x-3 bg-red-50 border border-red-200 rounded-xl p-4 fade-in">
            <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            <p class="text-sm text-red-700" x-text="error"></p>
        </div>
    </template>
</div>

<script>
function projectForm() {
    return {
        name: '', description: '', start_date: '', target_end_date: '',
        loading: false, loadingText: 'Generating plan...', confirming: false,
        plan: null, projectId: null, error: null,

        async createAndPlan() {
            this.loading = true; this.error = null; this.plan = null;
            try {
                this.loadingText = 'Creating project...';
                const body = { name: this.name, description: this.description };
                if (this.start_date) body.start_date = this.start_date;
                if (this.target_end_date) body.target_end_date = this.target_end_date;
                const createRes = await fetch('/api/projects/', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                if (!createRes.ok) throw new Error('Failed to create project');
                const project = await createRes.json();
                this.projectId = project.id;

                this.loadingText = 'AI is analyzing and generating tasks...';
                const planRes = await fetch('/api/agent/generate-plan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ project_id: project.id }) });
                if (!planRes.ok) throw new Error('Failed to generate plan');
                const planData = await planRes.json();
                this.plan = planData.plan;
            } catch (e) {
                this.error = e.message;
            }
            this.loading = false;
        },

        async confirmAndAssign() {
            this.confirming = true; this.error = null;
            try {
                const res = await fetch('/api/agent/assign-contractors', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ project_id: this.projectId }) });
                if (!res.ok) throw new Error('Failed to assign contractors');
                window.location.href = '/projects/' + this.projectId;
            } catch (e) {
                this.error = e.message;
            }
            this.confirming = false;
        }
    }
}
</script>
{% endblock %}
