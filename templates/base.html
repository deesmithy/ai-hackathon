<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Superintendent AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-indigo-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight">Superintendent AI</a>
            <div class="flex space-x-6 text-sm font-medium">
                <a href="/" class="hover:text-indigo-200">Dashboard</a>
                <a href="/projects/new" class="hover:text-indigo-200">New Project</a>
                <a href="/contractors" class="hover:text-indigo-200">Contractors</a>
                <a href="/emails" class="hover:text-indigo-200">Email Log</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
