<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Superintendent AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                colors: {
                    brand: {
                        50: '#fdf8f0', 100: '#faebd7', 200: '#f4d5a8',
                        300: '#edb96e', 400: '#e6993a', 500: '#d97706',
                        600: '#b45309', 700: '#92400e', 800: '#78350f', 900: '#451a03',
                    },
                    surface: {
                        50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
                        300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
                    }
                }
            }
        }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.12); }
        .gradient-border { background: linear-gradient(135deg, #d97706 0%, #ea580c 100%); }
        .nav-link { position: relative; padding: 0.5rem 0; }
        .nav-link::after { content:''; position:absolute; bottom:0; left:0; width:0; height:2px; background:#d97706; transition: width 0.2s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .shimmer { background: linear-gradient(110deg, #f1f5f9 8%, #e2e8f0 18%, #f1f5f9 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
        @keyframes shimmer { to { background-position: -200% 0; } }
        /* Rendered markdown prose */
        .ai-prose h2 { font-size: 1rem; font-weight: 700; color: #1e293b; margin: 1.25rem 0 0.5rem; padding-bottom: 0.35rem; border-bottom: 1px solid #e2e8f0; }
        .ai-prose h3 { font-size: 0.875rem; font-weight: 600; color: #334155; margin: 1rem 0 0.4rem; }
        .ai-prose p { font-size: 0.8125rem; color: #475569; line-height: 1.6; margin: 0.4rem 0; }
        .ai-prose ul, .ai-prose ol { font-size: 0.8125rem; color: #475569; padding-left: 1.25rem; margin: 0.4rem 0; }
        .ai-prose li { margin: 0.15rem 0; line-height: 1.5; }
        .ai-prose strong { color: #1e293b; }
        .ai-prose hr { border: none; border-top: 1px solid #e2e8f0; margin: 1rem 0; }
        .ai-prose table { width: 100%; font-size: 0.8125rem; border-collapse: collapse; margin: 0.75rem 0; }
        .ai-prose th { text-align: left; font-weight: 600; color: #64748b; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.5rem 0.75rem; border-bottom: 2px solid #e2e8f0; }
        .ai-prose td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f1f5f9; color: #475569; }
        .ai-prose tr:hover td { background: #f8fafc; }
        .ai-prose code { font-size: 0.75rem; background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; color: #b45309; }
    </style>
</head>
<body class="bg-surface-50 min-h-screen" x-data="aiModal()" @ai-start.window="open($event.detail)" @ai-done.window="close()">

    <!-- AI Progress Modal -->
    <div x-show="visible" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed inset-0 z-[100] flex items-center justify-center" style="display:none">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-gray-900/50 backdrop-blur-sm"></div>
        <!-- Modal -->
        <div x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="relative bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center">
            <!-- Animated icon -->
            <div class="w-16 h-16 rounded-2xl gradient-border flex items-center justify-center mx-auto mb-5 shadow-lg shadow-brand-600/20">
                <svg class="w-8 h-8 text-white animate-spin" style="animation-duration:2s" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
                    <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-1" x-text="title"></h3>
            <p class="text-sm text-surface-500 mb-6" x-text="subtitle"></p>
            <!-- Cycling status messages -->
            <div class="bg-surface-50 rounded-xl p-3 text-left space-y-2">
                <template x-for="(msg, i) in visibleSteps" :key="i">
                    <div class="flex items-center space-x-2.5 text-xs" :class="i === visibleSteps.length - 1 ? 'text-brand-700 font-semibold' : 'text-surface-400'">
                        <template x-if="i < visibleSteps.length - 1">
                            <svg class="w-3.5 h-3.5 text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                        </template>
                        <template x-if="i === visibleSteps.length - 1">
                            <svg class="w-3.5 h-3.5 text-brand-600 flex-shrink-0 animate-pulse" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>
                        </template>
                        <span x-text="msg"></span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Top Nav -->
    <nav class="sticky top-0 z-50 glass border-b border-surface-200">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-3 group">
                    <div class="w-9 h-9 rounded-lg gradient-border flex items-center justify-center shadow-sm">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2 21h20M3 7v14M21 7v14M7 3h10l1 4H6l1-4zM7 11h2v3H7zM11 11h2v3h-2zM15 11h2v3h-2zM7 17h2v4H7zM15 17h2v4h-2z"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-gray-900 tracking-tight">Superintendent<span class="text-brand-600">.ai</span></span>
                </a>
                <div class="flex items-center space-x-8">
                    {% set current_path = request.url.path if request else '/' %}
                    <a href="/" class="nav-link text-sm font-medium {{ 'text-brand-700 active' if current_path == '/' else 'text-surface-500 hover:text-gray-900' }}">Dashboard</a>
                    <a href="/projects/new" class="nav-link text-sm font-medium {{ 'text-brand-700 active' if current_path == '/projects/new' else 'text-surface-500 hover:text-gray-900' }}">New Project</a>
                    <a href="/contractors" class="nav-link text-sm font-medium {{ 'text-brand-700 active' if current_path == '/contractors' else 'text-surface-500 hover:text-gray-900' }}">Contractors</a>
                    <a href="/emails" class="nav-link text-sm font-medium {{ 'text-brand-700 active' if current_path == '/emails' else 'text-surface-500 hover:text-gray-900' }}">Emails</a>
                    <div x-data="{ polling: false, done: false }">
                        <button @click="polling=true; done=false; fetch('/api/agent/poll-inbox', {method:'POST'}).then(()=>{polling=false; done=true; setTimeout(()=>done=false, 3000)})"
                            :disabled="polling"
                            class="inline-flex items-center space-x-1.5 text-xs font-semibold px-3 py-1.5 rounded-lg border transition-all"
                            :class="done ? 'border-emerald-300 bg-emerald-50 text-emerald-700' : 'border-surface-200 bg-white text-surface-500 hover:border-surface-300 hover:text-gray-700 disabled:opacity-50'">
                            <template x-if="polling"><svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg></template>
                            <template x-if="!polling && done"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.5 12.75l6 6 9-13.5"/></svg></template>
                            <template x-if="!polling && !done"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg></template>
                            <span x-text="polling ? 'Checking...' : done ? 'Done!' : 'Check Inbox'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 fade-in">
        {% block content %}{% endblock %}
    </main>

    <script>
    function aiModal() {
        return {
            visible: false,
            title: '',
            subtitle: '',
            steps: [],
            visibleSteps: [],
            _timer: null,
            _stepIdx: 0,

            open(detail) {
                this.title = detail.title || 'AI is working...';
                this.subtitle = detail.subtitle || 'This usually takes 10–30 seconds.';
                this.steps = detail.steps || ['Analyzing project data...', 'Thinking...', 'Done'];
                this.visibleSteps = [this.steps[0]];
                this._stepIdx = 0;
                this.visible = true;
                this._advance();
            },

            _advance() {
                this._timer = setInterval(() => {
                    if (this._stepIdx < this.steps.length - 1) {
                        this._stepIdx++;
                        this.visibleSteps = this.steps.slice(0, this._stepIdx + 1);
                    }
                }, 2800);
            },

            close() {
                clearInterval(this._timer);
                this.visible = false;
            }
        }
    }

    // Helper: dispatch ai-start event to show modal, returns a done() callback
    function aiAction(title, subtitle, steps) {
        window.dispatchEvent(new CustomEvent('ai-start', { detail: { title, subtitle, steps } }));
        return () => window.dispatchEvent(new CustomEvent('ai-done'));
    }
    </script>

    <footer class="border-t border-surface-200 mt-auto">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <p class="text-xs text-surface-400 text-center">Superintendent AI &mdash; AI-powered construction project management</p>
        </div>
    </footer>
</body>
</html>
